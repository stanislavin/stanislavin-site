<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f8fafc;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }

        p {
            font-size: 1.25rem;
            color: #94a3b8;
            max-width: 480px;
            line-height: 1.6;
        }

        .projects {
            margin-top: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            align-items: center;
        }

        .project-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 1rem 1.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
            width: 100%;
            max-width: 400px;
        }

        .project-card:hover {
            border-color: #FF6B00;
            background: rgba(255,107,0,0.06);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(255,107,0,0.15);
        }

        .project-icon { font-size: 2rem; }

        .project-info { text-align: left; }
        .project-name { font-weight: 600; font-size: 1rem; color: #f8fafc; }
        .project-desc { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon</h1>
        <p>We're working on something new. Stay tuned.</p>
        <div class="projects">
            <a href="/naruto/" class="project-card">
                <div class="project-icon">🍃</div>
                <div class="project-info">
                    <div class="project-name">Naruto Jutsu Cam</div>
                    <div class="project-desc">Cast jutsu with your hand signs via webcam</div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
